{% extends 'base.html' %}
{% block content %}
  <section class="landlord-panel">
    <div class="landlord-header">
      <div>
        <h1>Create a New Listing</h1>
        <p>Only landlords can add property listings. Enter the details below and publish your property.</p>
      </div>
      <a class="button" href="{{ url_for('landlord.listings') }}">Back to Listings</a>
    </div>

    <form method="post" class="listing-form" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        <span>Title</span>
        <input type="text" name="title" placeholder="Example: Cozy apartment downtown" required>
      </label>
      <label>
        <span>Description</span>
        <textarea name="description" placeholder="Detailed property description" rows="5" required></textarea>
      </label>
      <label>
        <span>Address</span>
        <input type="text" name="address" placeholder="123 Main St" required>
      </label>
      <label>
        <span>City</span>
        <input type="text" name="city" placeholder="City name" required>
      </label>
      <label>
        <span>Price</span>
        <input type="number" step="0.01" name="price" placeholder="e.g. 1200.00" required>
      </label>
      <label>
        <span>Property Image</span>
        <input type="file" name="image" accept="image/jpeg,image/png">
      </label>
      <label>
        <span>Video tour</span>
        <input type="file" name="video" accept="video/*">
      </label>
      <button type="submit" class="submit-button">Publish Listing</button>
    </form>
  </section>
{% endblock %}
